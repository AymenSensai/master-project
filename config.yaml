# System Configurations
seed: 42
device: "cuda"

# Dataset Configurations
dataset:
  root_dir: "./data/TuftsFaceDatabase"
  img_size: 112
  num_workers: 0

# Training Configurations
train:
  batch_size: 128
  epochs: 200
  learning_rate: 0.0001
  weight_decay: 0.0005
  step_size: 60
  gamma: 0.1
  # Loss weights
  lambda_softmax: 1.0
  lambda_triplet: 1.0
  margin: 0.5
  save_dir: "./checkpoints"

# Evaluation Configurations
eval:
  batch_size: 128
  far_targets: [0.1, 0.01, 0.001]
